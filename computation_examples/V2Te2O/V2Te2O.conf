#This is the configuration file for V2Te2O computations
#the format is key=value
#matches: key=value
# my-key = value
# my.key= value with spaces
#KEY_NAME =   value123
# complex-key.name = some value here
#does not match:
# = value              # No key
# key =                # No value, this must be filled
# key value            # No equals sign
# my key = value       # Space in key (not allowed)
# key==value          # Multiple equals (first = becomes part of key)

#name of the system
name=V2Te2O

#dimension of system
dim=2

#directions to study, available directions x,y,z
directions_to_study=x,y

#whether spin is considered
spin=False

truncation_radius=8.2

lattice_basis=4.0525, 0.0, 0.0; 0.0, 4.0525, 0.0; 0.0, 0.0, 8.4336


space_group=123

space_group_origin=0,0,0

space_group_name_H_M=P4/MMM

cell_setting=tetragonal

Wyckoff_position_num=3


#Wyckoff position label O0, input orbitals
#O0_orbitals=
#one position of O0, coefficients  (fractional coordinates)
#O0_position_coefs=0.0, 0.0, 0.0

#Wyckoff position label V0, input orbitals
V0_orbitals=3dxz,3dxy
#one position of V0, coefficients  (fractional coordinates)
V0_position_coefs=0.5, 0.0, 0.0

#Wyckoff position label Te0, input orbitals
#Te0_orbitals=
#one position of Te0, coefficients  (fractional coordinates)
#Te0_position_coefs=0.5, 0.5, 0.15

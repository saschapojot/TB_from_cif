#This is the configuration file for WTe2 computations
#the format is key=value
#matches: key=value
# my-key = value
# my.key= value with spaces
#KEY_NAME =   value123
# complex-key.name = some value here
#does not match:
# = value              # No key
# key =                # No value, this must be filled
# key value            # No equals sign
# my key = value       # Space in key (not allowed)
# key==value          # Multiple equals (first = becomes part of key)

#name of the system
name=WTe2

#dimension of system
dim=2

#directions to study, available directions x,y,z
directions_to_study=x,y

#whether spin is considered
spin=False

truncation_radius=12

lattice_basis=3.4925, 0.0, 0.0; 0.0, 6.3148, 0.0; 0.0, 0.0, 20.16


space_group=11

space_group_origin=0,0,0

space_group_name_H_M=P21/M

cell_setting=monoclinic

Wyckoff_position_num=3


#Wyckoff position label W0, input orbitals
W0_orbitals=5dx2-y2
#one position of W0, coefficients  (fractional coordinates)
W0_position_coefs=0.25, 0.178127, 0.504838

#Wyckoff position label Te0, input orbitals
Te0_orbitals=5px
#one position of Te0, coefficients  (fractional coordinates)
Te0_position_coefs=0.25, 0.572013, 0.573093

#Wyckoff position label Te1, input orbitals
#Te1_orbitals=
#one position of Te1, coefficients  (fractional coordinates)
#Te1_position_coefs=0.75, 0.0818, 0.60351
